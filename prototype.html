<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Cursor · 一期高保真原型</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2a313c;
    --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --accent2:#d2a8ff;
    --green:#3fb950; --red:#f85149; --yellow:#d29922; --orange:#ffa657;
    --kw:#ff7b72; --str:#a5d6ff; --com:#8b949e; --fn:#d2a8ff;
    --bubble-user:#1f6feb; --code-bg:#0b0f14;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    font-size:14px;overflow:hidden}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:"SF Mono","JetBrains Mono",Menlo,monospace}

  /* ---- TopBar ---- */
  .topbar{height:48px;display:flex;align-items:center;gap:12px;padding:0 16px;
    background:var(--panel);border-bottom:1px solid var(--border)}
  .logo{font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:7px}
  .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
  .proj{color:var(--muted);font-size:13px}
  .proj b{color:var(--fg);font-weight:500}
  .topbar .spacer{flex:1}
  .tbtn{background:var(--panel2);border:1px solid var(--border);color:var(--fg);
    padding:6px 12px;border-radius:7px;font-size:13px;display:inline-flex;align-items:center;gap:6px}
  .tbtn:hover{border-color:var(--accent);background:#222b39}
  .tbtn:disabled{opacity:.4;cursor:not-allowed}
  .tbtn.primary{background:var(--accent);border-color:var(--accent);color:#04101f;font-weight:600}
  .tbtn.primary:hover{background:#79b8ff}

  /* ---- Layout ---- */
  .body{display:flex;height:calc(100vh - 48px)}
  .col{display:flex;flex-direction:column;min-width:0;height:100%}
  .col-chat{width:340px;border-right:1px solid var(--border);background:var(--panel)}
  .col-editor{flex:1.05;border-right:1px solid var(--border);background:var(--code-bg)}
  .col-preview{flex:1;background:var(--panel)}
  .col-head{height:36px;flex:none;display:flex;align-items:center;gap:8px;padding:0 14px;
    border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.06em}
  .col-head .ic{font-size:13px}

  /* ---- Chat ---- */
  .chat-scroll{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px}
  .welcome{color:var(--muted);line-height:1.7}
  .welcome h3{color:var(--fg);font-size:15px;margin:0 0 6px}
  .chips{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .chip{background:var(--panel2);border:1px solid var(--border);border-radius:9px;
    padding:9px 12px;font-size:13px;color:var(--fg);text-align:left;display:flex;align-items:center;gap:9px;transition:.12s}
  .chip:hover{border-color:var(--accent);transform:translateX(2px)}
  .chip .k{color:var(--accent)}
  .chip.demo{border-style:dashed}
  .chip.demo .k{color:var(--orange)}
  .chip.demo.fail .k{color:var(--red)}
  .sect-label{font-size:11px;color:#5a6573;text-transform:uppercase;letter-spacing:.08em;margin:16px 0 2px}

  .msg{display:flex;gap:9px;max-width:100%}
  .msg .av{width:26px;height:26px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;font-size:14px}
  .msg.user{flex-direction:row-reverse}
  .msg.user .av{background:var(--bubble-user)}
  .msg.ai .av{background:#30363d}
  .bubble{padding:9px 12px;border-radius:11px;line-height:1.6;font-size:13.5px;word-break:break-word}
  .msg.user .bubble{background:var(--bubble-user);color:#fff;border-top-right-radius:3px}
  .msg.ai .bubble{background:var(--panel2);border:1px solid var(--border);border-top-left-radius:3px}
  .bubble .ok{color:var(--green)}
  .bubble .err{color:var(--red)}
  .bubble .diff{font-family:"SF Mono",Menlo,monospace;font-size:12px;color:var(--orange);margin-top:5px}

  /* spinner */
  .spin{display:inline-block;width:12px;height:12px;border:2px solid #3a4150;border-top-color:var(--accent);
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* heal card */
  .heal{margin-top:9px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#12161d}
  .heal-row{display:flex;align-items:center;gap:8px;padding:8px 11px;font-size:12.5px;border-top:1px solid var(--border)}
  .heal-row:first-child{border-top:none;background:#171c24;font-weight:600}
  .heal-row .num{width:18px;height:18px;border-radius:50%;background:#30363d;display:flex;align-items:center;justify-content:center;font-size:11px;flex:none}
  .heal-row.active .num{background:var(--yellow);color:#04101f}
  .heal-row.done .num{background:var(--green);color:#04101f}
  .heal-step{color:var(--muted);font-size:12px;padding:5px 11px 5px 37px;display:flex;align-items:center;gap:7px}
  .heal-step .tick{color:var(--green)}

  /* ---- Composer ---- */
  .composer{flex:none;border-top:1px solid var(--border);padding:12px 14px;background:var(--panel)}
  .composer .wrap{background:var(--code-bg);border:1px solid var(--border);border-radius:11px;padding:8px 10px;transition:.15s}
  .composer .wrap:focus-within{border-color:var(--accent)}
  .composer textarea{width:100%;background:transparent;border:none;outline:none;color:var(--fg);
    resize:none;font-family:inherit;font-size:13.5px;line-height:1.5;height:38px}
  .composer .row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
  .hint{font-size:11px;color:#5a6573}
  .send{background:var(--accent);color:#04101f;border:none;border-radius:8px;padding:6px 14px;font-weight:600;font-size:13px}
  .send:hover{background:#79b8ff}
  .send:disabled{opacity:.45;cursor:not-allowed}
  .stop{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:6px 12px;font-size:13px;display:none}

  /* ---- Editor ---- */
  .editor-wrap{flex:1;overflow:auto;position:relative}
  .editor{display:flex;min-height:100%;font-family:"SF Mono",Menlo,monospace;font-size:12.7px;line-height:1.65}
  .gutter{flex:none;padding:14px 0;text-align:right;color:#414b58;user-select:none;background:#0b0f14;border-right:1px solid #161b22}
  .gutter span{display:block;padding:0 12px 0 16px}
  .code{padding:14px 16px;white-space:pre;flex:1;tab-size:2}
  .code .kw{color:var(--kw)} .code .str{color:var(--str)} .code .com{color:var(--com)} .code .fn{color:var(--fn)} .code .tag{color:#7ee787}
  .ln-err{background:rgba(248,81,73,.13);box-shadow:inset 3px 0 0 var(--red)}
  .editor-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#3a4150;gap:8px;font-family:Menlo,monospace;font-size:13px}
  .editor-dim{opacity:.35;filter:blur(.4px);transition:.2s}
  .writing{position:absolute;top:12px;right:16px;font-size:11px;color:var(--accent);display:none;align-items:center;gap:6px}

  /* ---- Preview ---- */
  .statusbar{height:34px;flex:none;display:flex;align-items:center;gap:9px;padding:0 14px;border-bottom:1px solid var(--border);font-size:12.5px;background:var(--panel)}
  .statusbar .led{width:9px;height:9px;border-radius:50%;background:#3a4150}
  .statusbar.s-load .led{background:var(--accent);animation:pulse 1s infinite}
  .statusbar.s-ok .led{background:var(--green);box-shadow:0 0 8px var(--green)}
  .statusbar.s-err .led{background:var(--red);box-shadow:0 0 8px var(--red)}
  .statusbar.s-ok{color:#7ee787} .statusbar.s-err{color:#ff9c96} .statusbar.s-load{color:#9dc7ff}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .statusbar .meta{color:var(--muted);margin-left:auto;font-size:11.5px}
  .preview-stage{flex:1;position:relative;background:#fff}
  iframe#preview{width:100%;height:100%;border:none;background:#fff}
  .preview-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);background:var(--panel)}
  .preview-empty .box{width:64px;height:64px;border:2px dashed #30363d;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}

  /* error overlay */
  .overlay{position:absolute;inset:0;background:rgba(13,17,23,.92);backdrop-filter:blur(2px);
    display:none;flex-direction:column;padding:22px;color:var(--fg);overflow:auto}
  .overlay.show{display:flex}
  .overlay .tag{display:inline-flex;align-items:center;gap:7px;color:var(--red);font-weight:700;font-size:13px;margin-bottom:12px}
  .overlay .ttl{font-family:Menlo,monospace;font-size:14px;color:#ff9c96;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:8px;padding:11px 13px;line-height:1.5}
  .overlay .stack{font-family:Menlo,monospace;font-size:12px;color:var(--muted);margin-top:12px;line-height:1.7;white-space:pre-wrap;display:none}
  .overlay .acts{margin-top:auto;display:flex;gap:9px;padding-top:16px}
  .obtn{background:var(--panel2);border:1px solid var(--border);color:var(--fg);padding:7px 14px;border-radius:8px;font-size:13px}
  .obtn:hover{border-color:var(--accent)}
  .obtn.warn{border-color:var(--yellow);color:var(--yellow)}

  /* ---- Modal ---- */
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
  .mask.show{display:flex}
  .modal{width:430px;background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border);font-weight:600}
  .modal-head .x{background:none;border:none;color:var(--muted);font-size:18px}
  .modal-body{padding:18px;line-height:1.7}
  .modal-body .desc{color:var(--muted);font-size:13px;margin-bottom:16px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .field input[type=text]{width:100%;background:var(--code-bg);border:1px solid var(--border);border-radius:8px;color:var(--fg);padding:8px 11px;font-family:Menlo,monospace;font-size:13px}
  .radio{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px;cursor:pointer}
  .radio.on{border-color:var(--accent);background:rgba(88,166,255,.07)}
  .radio.lock{opacity:.5;cursor:not-allowed}
  .radio input{margin-top:3px}
  .radio .t{font-size:13.5px} .radio .s{font-size:11.5px;color:var(--muted);margin-top:2px}
  .badge2{font-size:10px;background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;color:var(--muted);margin-left:6px}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 18px;border-top:1px solid var(--border)}

  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:11px 18px;font-size:13px;
    opacity:0;transition:.25s;z-index:60;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .banner{font-size:11px;color:var(--muted);text-align:center;padding:5px;background:#11151c;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<div class="banner">🧪 一期高保真原型 · 可交互演示（预览区为真实可点的迷你应用；AI 行为为脚本模拟）</div>

<!-- TopBar -->
<div class="topbar">
  <div class="logo"><span class="dot"></span> Web Cursor</div>
  <span class="proj">· <b id="projName">未命名项目</b></span>
  <div class="spacer"></div>
  <button class="tbtn" id="btnRerun" disabled>↻ 重跑</button>
  <button class="tbtn primary" id="btnExport" disabled>⬇ 导出 HTML</button>
  <button class="tbtn" id="btnSettings">⚙</button>
</div>

<div class="body">
  <!-- ===== 左:对话/Agent ===== -->
  <div class="col col-chat">
    <div class="col-head"><span class="ic">💬</span> AI 对话 · Agent</div>
    <div class="chat-scroll" id="chat">
      <!-- welcome (S0) -->
      <div class="welcome" id="welcome">
        <h3>👋 描述你想做的 React 界面</h3>
        我来帮你写代码、运行，跑挂了还会自己修。
        <div class="sect-label">快速开始</div>
        <div class="chips">
          <button class="chip" data-act="happy" data-proj="todo"><span class="k">⌁</span> 一个待办列表</button>
          <button class="chip" data-act="happy" data-proj="counter"><span class="k">⌁</span> 一个计数器</button>
          <button class="chip" data-act="happy" data-proj="login"><span class="k">⌁</span> 一个登录表单</button>
        </div>
        <div class="sect-label">演示核心能力</div>
        <div class="chips">
          <button class="chip demo" data-act="heal"><span class="k">▶</span> 演示「AI 自我修复」</button>
          <button class="chip demo fail" data-act="fail"><span class="k">▶</span> 演示「修复失败兜底」</button>
        </div>
      </div>
    </div>
    <div class="composer">
      <div class="wrap">
        <textarea id="input" placeholder="描述你想要的界面…（例如：做一个待办列表）"></textarea>
        <div class="row">
          <span class="hint">⏎ 发送 · ⇧⏎ 换行</span>
          <div>
            <button class="stop" id="btnStop">■ 停止</button>
            <button class="send" id="btnSend">发送 ⏎</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 中:编辑器 ===== -->
  <div class="col col-editor">
    <div class="col-head"><span class="ic">📄</span> App.tsx <span id="dirtyDot" style="color:var(--orange);display:none">●</span></div>
    <div class="editor-wrap" id="editorWrap">
      <div class="editor-empty" id="editorEmpty">// 还没有代码<br>// 在左侧描述需求，AI 会写在这里</div>
      <div class="writing" id="writing"><span class="spin"></span> AI 正在写入…</div>
      <div class="editor" id="editor" style="display:none">
        <div class="gutter" id="gutter"></div>
        <div class="code" id="code"></div>
      </div>
    </div>
  </div>

  <!-- ===== 右:预览 ===== -->
  <div class="col col-preview">
    <div class="col-head"><span class="ic">🖥</span> 实时预览</div>
    <div class="statusbar" id="statusbar"><span class="led"></span><span id="statusText">等待生成</span><span class="meta" id="statusMeta"></span></div>
    <div class="preview-stage">
      <div class="preview-empty" id="previewEmpty"><div class="box">⌨</div>生成后在这里预览</div>
      <iframe id="preview"></iframe>
      <!-- error overlay (R4) -->
      <div class="overlay" id="overlay">
        <span class="tag">⚠ Runtime Error</span>
        <div class="ttl" id="ovTitle"></div>
        <div class="stack" id="ovStack"></div>
        <div class="acts">
          <button class="obtn" id="ovDetail">查看详情</button>
          <button class="obtn warn" id="ovTakeover">手动接管</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Export modal (R7 / S6) -->
<div class="mask" id="mask">
  <div class="modal">
    <div class="modal-head">导出为静态 HTML <button class="x" id="mClose">✕</button></div>
    <div class="modal-body">
      <div class="desc">把当前结果导出成一个 .html 文件，在浏览器打开即可运行。</div>
      <div class="field">
        <label>文件名</label>
        <input type="text" id="fname" value="my-app.html">
      </div>
      <div class="field">
        <label>依赖方式</label>
        <label class="radio on" id="rdoB"><input type="radio" name="dep" checked>
          <div><div class="t">联网运行 <span class="badge2">一期默认</span></div><div class="s">体积小，依赖走 CDN，打开需联网</div></div></label>
        <label class="radio lock" id="rdoA"><input type="radio" name="dep" disabled>
          <div><div class="t">完全离线 <span class="badge2">🔒 二期</span></div><div class="s">依赖内联，断网也能 file:// 双击运行</div></div></label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="tbtn" id="mCancel">取消</button>
      <button class="tbtn primary" id="mDownload">⬇ 下载 HTML</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   原型数据：每个项目 = { name, prompt, code(lines[]), preview(html), errLine? }
   预览是真实可交互的迷你应用（plain JS，无依赖）。
   ============================================================ */
function previewDoc(body){
  return '<!DOCTYPE html><html><head><meta charset="utf-8"><style>'
    +'*{box-sizing:border-box}body{font-family:-apple-system,"PingFang SC",sans-serif;margin:0;padding:28px;color:#1a1a1a}'
    +'h1{font-size:20px;margin:0 0 16px}button{font-family:inherit;cursor:pointer}'
    +'.wrap{max-width:380px;margin:0 auto}'
    +'</style></head><body>'+body+'</body></html>';
}

var DATA = {
  todo: {
    name:'待办列表',
    prompt:'做一个待办列表',
    code:[
      'import React, { useState } from "react";',
      '',
      'export default function App() {',
      '  const [list, setList] = useState([',
      '    { text: "学习 React", done: false },',
      '    { text: "写 playground", done: true },',
      '  ]);',
      '  const [val, setVal] = useState("");',
      '',
      '  const add = () => {',
      '    if (!val.trim()) return;',
      '    setList([...list, { text: val, done: false }]);',
      '    setVal("");',
      '  };',
      '',
      '  return (',
      '    <div className="wrap">',
      '      <h1>我的待办</h1>',
      '      {list.map((it, i) => (',
      '        <label key={i} className="item">',
      '          <input type="checkbox" checked={it.done} />',
      '          <span>{it.text}</span>',
      '        </label>',
      '      ))}',
      '      <div className="add">',
      '        <input value={val} onChange={e => setVal(e.target.value)} />',
      '        <button onClick={add}>添加</button>',
      '      </div>',
      '    </div>',
      '  );',
      '}'
    ],
    preview: previewDoc(
      '<div class="wrap"><h1>我的待办</h1><div id="list"></div>'
      +'<div style="display:flex;gap:8px;margin-top:14px">'
      +'<input id="inp" placeholder="添加任务" style="flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:8px">'
      +'<button id="addb" style="padding:8px 16px;background:#1f6feb;color:#fff;border:none;border-radius:8px">添加</button></div>'
      +'<style>.item{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid #eee}'
      +'.item span.d{text-decoration:line-through;color:#aaa}</style>'
      +'<scr'+'ipt>var items=[{t:"学习 React",d:false},{t:"写 playground",d:true}];'
      +'function render(){var h="";for(var i=0;i<items.length;i++){var it=items[i];'
      +'h+=\'<label class="item"><input type="checkbox" data-i="\'+i+\'" \'+(it.d?"checked":"")+\'>\'+'
      +'\'<span class="\'+(it.d?"d":"")+\'">\'+it.t+\'</span></label>\';}'
      +'document.getElementById("list").innerHTML=h;'
      +'var cbs=document.querySelectorAll(".item input");for(var j=0;j<cbs.length;j++){cbs[j].onchange=function(){items[this.dataset.i].d=this.checked;render();};}}'
      +'document.getElementById("addb").onclick=function(){var v=document.getElementById("inp").value.trim();if(!v)return;items.push({t:v,d:false});document.getElementById("inp").value="";render();};'
      +'render();</scr'+'ipt></div>')
  },
  counter:{
    name:'计数器',
    prompt:'做一个计数器',
    code:[
      'import React, { useState } from "react";',
      '',
      'export default function App() {',
      '  const [n, setN] = useState(0);',
      '  return (',
      '    <div className="wrap" style={{textAlign:"center"}}>',
      '      <h1>计数器</h1>',
      '      <div className="num">{n}</div>',
      '      <button onClick={() => setN(n - 1)}>－</button>',
      '      <button onClick={() => setN(n + 1)}>＋</button>',
      '    </div>',
      '  );',
      '}'
    ],
    preview: previewDoc(
      '<div class="wrap" style="text-align:center"><h1>计数器</h1>'
      +'<div id="num" style="font-size:56px;font-weight:700;margin:14px 0;color:#1f6feb">0</div>'
      +'<button id="dec" style="font-size:20px;width:48px;height:48px;border-radius:12px;border:1px solid #ddd;background:#fff;margin:0 6px">－</button>'
      +'<button id="inc" style="font-size:20px;width:48px;height:48px;border-radius:12px;border:none;background:#1f6feb;color:#fff;margin:0 6px">＋</button>'
      +'<scr'+'ipt>var n=0;var el=document.getElementById("num");'
      +'document.getElementById("inc").onclick=function(){n++;el.textContent=n;};'
      +'document.getElementById("dec").onclick=function(){n--;el.textContent=n;};</scr'+'ipt></div>')
  },
  login:{
    name:'登录表单',
    prompt:'做一个登录表单',
    code:[
      'import React, { useState } from "react";',
      '',
      'export default function App() {',
      '  const [email, setEmail] = useState("");',
      '  const [pwd, setPwd] = useState("");',
      '  return (',
      '    <div className="wrap">',
      '      <h1>登录</h1>',
      '      <input placeholder="邮箱" value={email}',
      '        onChange={e => setEmail(e.target.value)} />',
      '      <input type="password" placeholder="密码" value={pwd}',
      '        onChange={e => setPwd(e.target.value)} />',
      '      <button>登录</button>',
      '    </div>',
      '  );',
      '}'
    ],
    preview: previewDoc(
      '<div class="wrap"><h1>登录</h1>'
      +'<input placeholder="邮箱" style="display:block;width:100%;padding:11px;margin-bottom:11px;border:1px solid #ddd;border-radius:9px">'
      +'<input type="password" placeholder="密码" style="display:block;width:100%;padding:11px;margin-bottom:16px;border:1px solid #ddd;border-radius:9px">'
      +'<button onclick="alert(\'登录（演示）\')" style="width:100%;padding:11px;background:#1f6feb;color:#fff;border:none;border-radius:9px;font-size:15px">登录</button></div>')
  },
  // 自我修复用：带 bug 的待办（list.mp）
  todoBug:{
    name:'待办列表',
    prompt:'做一个待办列表',
    errLine: 19,
    errMsg: 'TypeError: list.mp is not a function',
    errStack: 'at App (App.tsx:19:13)\n  at renderWithHooks (react-dom.js:14985)\n  at mountIndeterminateComponent (react-dom.js:17811)',
    code:[
      'import React, { useState } from "react";',
      '',
      'export default function App() {',
      '  const [list, setList] = useState([',
      '    { text: "学习 React", done: false },',

      '  const [val, setVal] = useState("");',
      '',
      '  const add = () => {',
      '    if (!val.trim()) return;',

      '    setVal("");',

      '',
      '  return (',
      '    <div className="wrap">',
      '      <h1>我的待办</h1>',
      '      {list.mp((it, i) => (',
      '        <label key={i} className="item">',
      '          <input type="checkbox" checked={it.done} />',
      '          <span>{it.text}</span>',

/* ---------- DOM ---------- */
var $=function(id){return document.getElementById(id)};
var chat=$('chat'), input=$('input'), btnSend=$('btnSend'), btnStop=$('btnStop');
var statusbar=$('statusbar'), statusText=$('statusText'), statusMeta=$('statusMeta');
var overlay=$('overlay'), iframe=$('preview');
var state={phase:'empty', cur:null, renderCount:0, aborted:false};
var timers=[];
function later(fn,ms){var t=setTimeout(fn,ms);timers.push(t);return t;}
function clearTimers(){timers.forEach(clearTimeout);timers=[];}

/* ---------- 工具 ---------- */
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1900);}
function scrollChat(){chat.scrollTop=chat.scrollHeight;}
function setStatus(kind,text,meta){
  statusbar.className='statusbar'+(kind?(' s-'+kind):'');
  statusText.textContent=text; statusMeta.textContent=meta||'';
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(line){
  var s=escapeHtml(line);
  s=s.replace(/(\/\/.*)$/,'<span class="com">$1</span>');
  s=s.replace(/(&quot;[^&]*?&quot;|"[^"]*")/g,'<span class="str">$1</span>');
  s=s.replace(/\b(import|from|export|default|function|const|let|return|type|useState)\b/g,'<span class="kw">$1</span>');
  s=s.replace(/(&lt;\/?[A-Za-z][\w.]*)/g,'<span class="tag">$1</span>');
  return s;
}
function renderEditor(lines,errLine){
  $('editorEmpty').style.display='none';
  $('editor').style.display='flex';
  var g='',c='';
  for(var i=0;i<lines.length;i++){
    var n=i+1, isErr=(errLine && n===errLine);
    g+='<span'+(isErr?' style="color:#f85149"':'')+'>'+n+'</span>';
    c+='<div'+(isErr?' class="ln-err"':'')+'>'+(highlight(lines[i])||' ')+'</div>';
  }
  $('gutter').innerHTML=g; $('code').innerHTML=c;
}
function showPreview(html){
  $('previewEmpty').style.display='none';
  iframe.style.display='block';
  iframe.srcdoc=html;
}
function hideOverlay(){overlay.classList.remove('show');}
function showOverlay(msg,stack){
  $('ovTitle').textContent=msg;
  $('ovStack').textContent=stack||''; $('ovStack').style.display='none';
  overlay.classList.add('show');
}

/* ---------- 聊天气泡 ---------- */
function addUser(text){
  var d=document.createElement('div');d.className='msg user';
  d.innerHTML='<div class="av">🧑</div><div class="bubble">'+escapeHtml(text)+'</div>';
  chat.appendChild(d);scrollChat();
}
function addAI(html){
  var d=document.createElement('div');d.className='msg ai';
  d.innerHTML='<div class="av">🤖</div><div class="bubble">'+html+'</div>';
  chat.appendChild(d);scrollChat();return d.querySelector('.bubble');
}

/* ---------- 生成前置 ---------- */
function beginGen(promptText){
  if(state.phase==='generating'||state.phase==='healing')return;
  clearTimers(); state.aborted=false; state.renderCount=0;
  $('welcome').style.display='none';
  hideOverlay();
  addUser(promptText);
  input.value=''; input.disabled=true;
  btnSend.style.display='none'; btnStop.style.display='inline-block';
  $('btnExport').disabled=true; $('btnRerun').disabled=true;
  state.phase='generating';
  setStatus('load','等待代码…','');
  $('writing').style.display='flex';
  $('editor').classList.add('editor-dim');
}
function endGenUI(){
  input.disabled=false; btnSend.style.display='inline-block'; btnStop.style.display='none';
  $('writing').style.display='none'; $('editor').classList.remove('editor-dim');
  $('btnRerun').disabled=false;
}

/* ---------- 场景 1：正常生成 ---------- */
function runHappy(projKey){
  var p=DATA[projKey]; state.cur=p; state.lastScenario={t:'happy',k:projKey};
  beginGen(p.prompt);
  var aiMsg=addAI('<span class="spin"></span> 正在生成…');
  later(function(){
    if(state.aborted)return;
    renderEditor(p.code);
    $('projName').textContent=p.name;
    later(function(){
      if(state.aborted)return;
      state.renderCount++;
      showPreview(p.preview);
      setStatus('ok','渲染成功','· '+(180+Math.floor(Math.random()*180))+'ms');
      aiMsg.innerHTML='已生成 <span class="ok">✓ 渲染成功</span>';
      state.phase='success'; endGenUI(); $('btnExport').disabled=false;
      scrollChat();
    },650);
  },900);
}

/* ---------- 场景 2：自我修复 ---------- */
function runHeal(){
  var bug=DATA.todoBug, fixed=DATA.todo;
  state.cur=fixed; state.lastScenario={t:'heal'};
  beginGen(bug.prompt);
  var aiMsg=addAI('<span class="spin"></span> 正在生成…');
  later(function(){
    if(state.aborted)return;
    renderEditor(bug.code, bug.errLine);
    $('projName').textContent=bug.name;
    aiMsg.innerHTML='已生成，正在运行…';
    later(function(){            // 首次渲染 → 报错
      if(state.aborted)return;
      state.renderCount++;
      setStatus('err','运行报错','· 第1次');
      showOverlay(bug.errMsg, bug.errStack);
      aiMsg.innerHTML='检测到错误，正在修复…'+healCardHtml(1);
      scrollChat();
      runHealAttempt(aiMsg, 1, true);   // true = 本次会成功
    },800);
  },900);
}
function healCardHtml(n){
  return '<div class="heal" id="healCard">'
    +'<div class="heal-row active" id="hr'+n+'"><span class="num">'+n+'</span> 第 '+n+' 次尝试 <span class="spin" style="margin-left:auto"></span></div>'
    +'<div class="heal-step" id="hs'+n+'"></div></div>';
}
function runHealAttempt(aiMsg, n, willSucceed){
  var steps=['<span class="spin"></span> 读取运行时报错','<span class="spin"></span> 定位问题代码','<span class="spin"></span> 修改并重新运行'];
  var hs=$('hs'+n), i=0;
  function tick(){
    if(state.aborted)return;
    if(i<steps.length){ hs.innerHTML=steps.slice(0,i+1).join('<br>'); i++; scrollChat(); later(tick,650); return; }
    // 步骤走完
    var hr=$('hr'+n); hr.classList.remove('active');
    var sp=hr.querySelector('.spin'); if(sp) sp.remove();
    if(willSucceed){
      hr.classList.add('done'); hr.querySelector('.num').textContent='✓';
      hs.innerHTML='<span class="tick">✓</span> 把 <code>list.mp</code> 改为 <code>list.map</code>';
      renderEditor(DATA.todo.code);            // 编辑器更新为修复后
      $('dirtyDot').style.display='none';
      hideOverlay();
      state.renderCount++;
      showPreview(DATA.todo.preview);
      setStatus('ok','渲染成功','· 第'+state.renderCount+'次 ✓');
      aiMsg.innerHTML='已修复 <span class="ok">✓</span> 第 '+(n+1)+' 次渲染成功'
        +'<div class="diff">▸ list.mp → list.map</div>';
      state.phase='success'; endGenUI(); $('btnExport').disabled=false;
      scrollChat();
    }
  }
  later(tick,500);
}

/* ---------- 场景 3：修复失败兜底 ---------- */
function runFail(){
  var bug=DATA.todoBug; state.cur=null; state.lastScenario={t:'fail'};
  beginGen(bug.prompt);
  var aiMsg=addAI('<span class="spin"></span> 正在生成…');
  later(function(){
    if(state.aborted)return;
    renderEditor(bug.code,bug.errLine);
    $('projName').textContent=bug.name;
    state.renderCount++;
    setStatus('err','运行报错','· 第1次');
    showOverlay(bug.errMsg,bug.errStack);
    aiMsg.innerHTML='检测到错误，正在修复…<div class="heal" id="healCard"></div>';
    state.phase='healing';
    failAttempt(aiMsg,1);
  },900);
}
function failAttempt(aiMsg,n){
  if(state.aborted)return;
  var card=$('healCard');
  card.insertAdjacentHTML('beforeend',
    '<div class="heal-row active" id="hr'+n+'"><span class="num">'+n+'</span> 第 '+n+' 次尝试 <span class="spin" style="margin-left:auto"></span></div>');
  scrollChat();
  later(function(){
    if(state.aborted)return;
    var hr=$('hr'+n); hr.classList.remove('active'); var sp=hr.querySelector('.spin'); if(sp)sp.remove();
    hr.querySelector('.num').textContent='✕'; hr.querySelector('.num').style.background='var(--red)';
    hr.insertAdjacentHTML('beforeend','<span style="margin-left:auto;color:var(--red);font-size:11px">仍报错</span>');
    state.renderCount++; setStatus('err','仍有错误','· 第'+state.renderCount+'次');
    if(n<3){ failAttempt(aiMsg,n+1); }
    else {
      aiMsg.innerHTML='<span class="err">尝试 3 次仍未修复 ✕</span>'
        +'<div style="margin-top:8px;color:var(--muted);font-size:12.5px">'+DATA.todoBug.errMsg+'</div>'
        +'<div style="margin-top:10px;display:flex;gap:8px">'
        +'<button class="obtn" onclick="retryFix()" style="font-size:12px;padding:5px 12px">重试</button>'
        +'<button class="obtn warn" onclick="takeover()" style="font-size:12px;padding:5px 12px">我来改</button></div>';
      // 把失败的 heal 卡重新挂回（上面 innerHTML 覆盖了），简化：保留文字即可
      state.phase='failed'; endGenUI();
      scrollChat();
    }
  },1400);
}
window.retryFix=function(){ runHeal(); };
window.takeover=function(){ hideOverlay(); toast('已切换为手动编辑模式'); $('dirtyDot').style.display='inline'; setStatus('err','等待手动修复',''); };

/* ---------- 停止 ---------- */
btnStop.onclick=function(){
  state.aborted=true; clearTimers(); endGenUI();
  setStatus('', '已停止','');
  addAI('已停止本次生成。');
  state.phase=state.renderCount>0?'success':'empty';
  if(state.renderCount>0)$('btnExport').disabled=false;
};

/* ---------- 发送 / 示例 ---------- */
function routeFree(text){
  var t=text.toLowerCase();
  if(t.indexOf('待办')>=0||t.indexOf('todo')>=0)return runHappy('todo');
  if(t.indexOf('计数')>=0||t.indexOf('counter')>=0)return runHappy('counter');
  if(t.indexOf('登录')>=0||t.indexOf('login')>=0)return runHappy('login');
  // 默认也给 todo，避免空
  return runHappy('todo');
}
btnSend.onclick=function(){var v=input.value.trim();if(!v)return;routeFree(v);};
input.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();btnSend.click();}
});
document.querySelectorAll('.chip').forEach(function(ch){
  ch.onclick=function(){
    var act=ch.dataset.act;
    if(act==='happy')runHappy(ch.dataset.proj);
    else if(act==='heal')runHeal();
    else if(act==='fail')runFail();
  };
});

/* ---------- 重跑 ---------- */
$('btnRerun').onclick=function(){
  var s=state.lastScenario; if(!s)return;
  if(s.t==='happy')runHappy(s.k); else if(s.t==='heal')runHeal(); else if(s.t==='fail')runFail();
};

/* ---------- 错误浮层按钮 ---------- */
$('ovDetail').onclick=function(){var st=$('ovStack');st.style.display=st.style.display==='none'?'block':'none';};
$('ovTakeover').onclick=function(){state.aborted=true;clearTimers();endGenUI();takeover();addAI('你已手动接管，自动修复已停止。');};

/* ---------- 导出弹窗 (R7) ---------- */
$('btnExport').onclick=function(){
  if($('btnExport').disabled)return;
  var nm=(state.cur&&state.cur.name)?state.cur.name:'my-app';
  $('fname').value=nm.replace(/[^\w一-龥]/g,'-')+'.html';
  $('mask').classList.add('show');
};
$('mClose').onclick=$('mCancel').onclick=function(){$('mask').classList.remove('show');};
$('mask').onclick=function(e){if(e.target===$('mask'))$('mask').classList.remove('show');};
$('mDownload').onclick=function(){
  var html=(state.cur&&state.cur.preview)?state.cur.preview:previewDoc('<div class="wrap"><h1>空</h1></div>');
  var blob=new Blob([html],{type:'text/html'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=$('fname').value||'app.html';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
  $('mask').classList.remove('show');
  toast('✓ 已导出 '+a.download);
};
$('btnSettings').onclick=function(){toast('设置（原型未实现）');};
</script>
