<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Cursor · 二期 change1 原型（持久化 + 多轮 + 历史 · Cursor模型）</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2a313c;
    --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --accent2:#d2a8ff;
    --green:#3fb950; --red:#f85149; --yellow:#d29922; --orange:#ffa657;
    --kw:#ff7b72; --str:#a5d6ff; --com:#8b949e; --fn:#d2a8ff;
    --bubble-user:#1f6feb; --code-bg:#0b0f14;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    font-size:14px;overflow:hidden}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none !important}

  /* ---- TopBar ---- */
  .topbar{height:48px;display:flex;align-items:center;gap:12px;padding:0 16px;
    background:var(--panel);border-bottom:1px solid var(--border)}
  .logo{font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:7px}
  .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
  .tag{font-size:10.5px;color:var(--accent2);border:1px solid #3a2f50;background:#1b1530;
    padding:1px 7px;border-radius:20px;letter-spacing:.03em}
  .crumb{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px}
  .crumb b{color:var(--fg);font-weight:500}
  .crumb .back{color:var(--accent);background:none;border:none;font-size:13px;display:inline-flex;align-items:center;gap:5px;padding:4px 6px;border-radius:6px}
  .crumb .back:hover{background:var(--panel2)}
  .topbar .spacer{flex:1}
  .tbtn{background:var(--panel2);border:1px solid var(--border);color:var(--fg);
    padding:6px 12px;border-radius:7px;font-size:13px;display:inline-flex;align-items:center;gap:6px}
  .tbtn:hover{border-color:var(--accent);background:#222b39}
  .tbtn.primary{background:var(--accent);border-color:var(--accent);color:#04101f;font-weight:600}
  .tbtn.primary:hover{background:#79b8ff}
  .owner{font-size:11px;color:#5a6573}
  .owner code{color:var(--muted);background:var(--panel2);padding:1px 6px;border-radius:5px;font-size:10.5px}

  /* ============ HOME（项目列表） ============ */
  .home{height:calc(100vh - 48px);overflow-y:auto;padding:36px 48px 60px}
  .home-head{display:flex;align-items:flex-end;justify-content:space-between;max-width:1080px;margin:0 auto 26px}
  .home-head h1{font-size:22px;margin:0 0 6px}
  .home-head p{color:var(--muted);margin:0;font-size:13.5px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;max-width:1080px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;
    cursor:pointer;transition:.14s;position:relative;min-height:132px;display:flex;flex-direction:column}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .card .emoji{font-size:26px;margin-bottom:10px}
  .card h3{font-size:15px;margin:0 0 4px}
  .card .meta{color:var(--muted);font-size:12px;margin-top:auto;display:flex;gap:10px;align-items:center}
  .card .del{position:absolute;top:12px;right:12px;opacity:0;background:var(--panel2);border:1px solid var(--border);
    color:var(--muted);width:24px;height:24px;border-radius:6px;font-size:12px;display:flex;align-items:center;justify-content:center;transition:.12s}
  .card:hover .del{opacity:1}
  .card .del:hover{color:var(--red);border-color:var(--red)}
  .card.new{border-style:dashed;align-items:center;justify-content:center;color:var(--muted);gap:8px}
  .card.new:hover{color:var(--accent)}
  .card.new .plus{font-size:30px;line-height:1}

  /* ============ WORKBENCH ============ */
  .body{display:flex;height:calc(100vh - 48px)}
  .col{display:flex;flex-direction:column;min-width:0;height:100%}
  .col-chat{width:380px;border-right:1px solid var(--border);background:var(--panel)}
  .col-editor{flex:1.05;border-right:1px solid var(--border);background:var(--code-bg)}
  .col-preview{flex:1;background:var(--panel)}
  .col-head{height:36px;flex:none;display:flex;align-items:center;gap:8px;padding:0 14px;
    border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.06em}

  /* ---- 会话切换区（同一项目的多条对话线索） ---- */
  .conv-bar{flex:none;border-bottom:1px solid var(--border);background:#13171f}
  .conv-bar-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 6px}
  .conv-bar-head .t{font-size:11px;color:#5a6573;text-transform:uppercase;letter-spacing:.07em}
  .conv-new{background:var(--panel2);border:1px solid var(--border);color:var(--accent);
    font-size:12px;padding:3px 9px;border-radius:7px;display:inline-flex;align-items:center;gap:4px}
  .conv-new:hover{border-color:var(--accent)}
  .conv-list{display:flex;flex-direction:column;gap:2px;padding:0 8px 9px;max-height:140px;overflow-y:auto}
  .conv-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.1s;border:1px solid transparent}
  .conv-item:hover{background:var(--panel2)}
  .conv-item.active{background:#172033;border-color:#244}
  .conv-item .ci{width:24px;height:24px;border-radius:6px;background:#222b39;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px}
  .conv-item.active .ci{background:var(--accent);color:#04101f}
  .conv-item .cm{min-width:0;flex:1}
  .conv-item .cm .ctitle{font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv-item .cm .ctime{font-size:11px;color:var(--muted);margin-top:1px}
  .conv-item .badge{font-size:10px;color:var(--muted);background:var(--panel2);border-radius:10px;padding:1px 6px;flex:none}

  /* ---- Chat ---- */
  .chat-scroll{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px}
  .restore-note{font-size:11px;color:var(--muted);text-align:center;padding:5px 8px;border:1px dashed var(--border);
    border-radius:8px;background:#12161d;display:flex;align-items:center;justify-content:center;gap:6px}
  .restore-note .k{color:var(--green)} .restore-note.fresh .k{color:var(--accent)}
  .msg{display:flex;gap:9px;max-width:100%}
  .msg .av{width:26px;height:26px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;font-size:14px}
  .msg.user{flex-direction:row-reverse}
  .msg.user .av{background:var(--bubble-user)}
  .msg.ai .av{background:#30363d}
  .bubble{padding:9px 12px;border-radius:11px;line-height:1.6;font-size:13.5px;word-break:break-word;min-width:0}
  .msg.user .bubble{background:var(--bubble-user);color:#fff;border-top-right-radius:3px}
  .msg.ai .bubble{background:var(--panel2);border:1px solid var(--border);border-top-left-radius:3px}
  .bubble .ok{color:var(--green)} .bubble .err{color:var(--red)}
  .bubble .diff{font-family:"SF Mono",Menlo,monospace;font-size:12px;color:var(--orange);margin-top:5px}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid #3a4150;border-top-color:var(--accent);
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .heal{margin-top:9px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#12161d}
  .heal-row{display:flex;align-items:center;gap:8px;padding:8px 11px;font-size:12.5px;border-top:1px solid var(--border)}
  .heal-row:first-child{border-top:none;background:#171c24;font-weight:600}
  .heal-row .num{width:18px;height:18px;border-radius:50%;background:#30363d;display:flex;align-items:center;justify-content:center;font-size:11px;flex:none}
  .heal-row.done .num{background:var(--green);color:#04101f}
  .heal-row.fail .num{background:var(--red);color:#04101f}
  .heal-step{color:var(--muted);font-size:12px;padding:5px 11px 5px 37px;display:flex;align-items:center;gap:7px}
  .heal-step .tick{color:var(--green)} .heal-step .x{color:var(--red)}

  /* ---- Composer ---- */
  .composer{flex:none;border-top:1px solid var(--border);padding:12px 14px;background:var(--panel)}
  .composer .wrap{background:var(--code-bg);border:1px solid var(--border);border-radius:11px;padding:8px 10px;transition:.15s}
  .composer .wrap:focus-within{border-color:var(--accent)}
  .composer textarea{width:100%;background:transparent;border:none;outline:none;color:var(--fg);
    resize:none;font-family:inherit;font-size:13.5px;line-height:1.5;height:38px}
  .composer .row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
  .hint{font-size:11px;color:#5a6573}
  .send{background:var(--accent);color:#04101f;border:none;border-radius:8px;padding:6px 14px;font-weight:600;font-size:13px}
  .send:hover{background:#79b8ff}

  /* ---- Editor ---- */
  .editor-wrap{flex:1;overflow:auto;position:relative}
  .editor{display:flex;min-height:100%;font-family:"SF Mono",Menlo,monospace;font-size:12.7px;line-height:1.65}
  .gutter{flex:none;padding:14px 0;text-align:right;color:#414b58;user-select:none;background:#0b0f14;border-right:1px solid #161b22}
  .gutter span{display:block;padding:0 12px 0 16px}
  .code{padding:14px 16px;white-space:pre;flex:1;tab-size:2}
  .code .kw{color:var(--kw)} .code .str{color:var(--str)} .code .com{color:var(--com)} .code .fn{color:var(--fn)} .code .tag{color:#7ee787}

  /* ---- Preview ---- */
  .statusbar{height:34px;flex:none;display:flex;align-items:center;gap:9px;padding:0 14px;border-bottom:1px solid var(--border);font-size:12.5px;background:var(--panel)}
  .statusbar .led{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .statusbar .meta{margin-left:auto;color:var(--muted);font-size:11.5px}
  .preview-stage{flex:1;background:#fff;color:#111;overflow:auto;padding:22px}

  .app-todo{max-width:340px;margin:0 auto;font-family:-apple-system,sans-serif}
  .app-todo h2{font-size:19px;margin:0 0 14px;color:#1a1a2e}
  .app-todo .add{display:flex;gap:8px;margin-bottom:14px}
  .app-todo input{flex:1;padding:9px 11px;border:1px solid #d7dbe0;border-radius:9px;font-size:14px}
  .app-todo .addb{background:#1f6feb;color:#fff;border:none;border-radius:9px;padding:0 16px;font-weight:600}
  .app-todo li{list-style:none;display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #eceef1;border-radius:9px;margin-bottom:7px}
  .app-todo li.done span{text-decoration:line-through;color:#9aa0a6}
  .app-todo li .dot{width:18px;height:18px;border-radius:50%;border:2px solid #1f6feb;flex:none}
  .app-todo li.done .dot{background:#1f6feb}
  .app-todo li span{flex:1;font-size:14px}
  .app-todo li .rm{color:#c33;border:none;background:none;font-size:16px}
  .app-todo.dark{background:#1a1a2e;color:#e6e6f0;padding:18px;border-radius:12px}
  .app-todo.dark h2{color:#fff} .app-todo.dark li{border-color:#2e2e48;background:#23233d}
  .app-counter{text-align:center;font-family:-apple-system,sans-serif;padding-top:20px}
  .app-counter .n{font-size:64px;font-weight:800;color:#1f6feb}
  .app-counter .btns{display:flex;gap:10px;justify-content:center;margin-top:14px}
  .app-counter button{width:46px;height:46px;border-radius:12px;border:1px solid #d7dbe0;background:#f5f7fa;font-size:22px}
  .app-login{max-width:300px;margin:10px auto;font-family:-apple-system,sans-serif}
  .app-login h2{font-size:19px;margin:0 0 16px;text-align:center}
  .app-login label{display:block;font-size:12px;color:#555;margin:10px 0 4px}
  .app-login input{width:100%;padding:9px 11px;border:1px solid #d7dbe0;border-radius:9px;font-size:14px}
  .app-login .sb{width:100%;margin-top:16px;background:#1f6feb;color:#fff;border:none;border-radius:9px;padding:11px;font-weight:600}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel2);border:1px solid var(--border);padding:10px 18px;border-radius:10px;font-size:13px;
    opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo"><span class="dot"></span>Web Cursor</span>
  <span class="tag">二期 · change1 · Cursor模型</span>
  <span class="crumb" id="crumb">
    <button class="back hidden" id="backBtn" onclick="goHome()">← 我的项目</button>
    <b id="crumbName">我的项目</b>
  </span>
  <span class="spacer"></span>
  <span class="owner">owner <code>a3f1…b9</code></span>
  <button class="tbtn" id="rerunBtn" onclick="toast('▶︎ 重新运行（mock）')">↻ 重新运行</button>
  <button class="tbtn primary" id="exportBtn" onclick="toast('⬇︎ 导出 HTML（mock）')">⬇ 导出</button>
</div>

<!-- HOME -->
<div class="home" id="view-home">
  <div class="home-head">
    <div>
      <h1>我的项目</h1>
      <p>项目 = 一份代码库（存 Postgres/Neon）· 一个项目下可开多条对话线索 · 匿名 owner 隔离</p>
    </div>
    <button class="tbtn primary" onclick="newProject()">＋ 新建项目</button>
  </div>
  <div class="grid" id="projectGrid"></div>
</div>

<!-- WORKBENCH -->
<div class="body hidden" id="view-workbench">
  <div class="col col-chat">
    <div class="col-head">💬 AI 对话 · Agent</div>
    <div class="conv-bar">
      <div class="conv-bar-head">
        <span class="t">对话线索（同一份代码）</span>
        <button class="conv-new" onclick="newConv()">＋ 新会话</button>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>
    <div class="chat-scroll" id="chatScroll"></div>
    <div class="composer">
      <div class="wrap">
        <textarea id="composer" placeholder="继续这条线索：再加个筛选 / 换个配色…（多轮上下文按会话记住）"></textarea>
        <div class="row">
          <span class="hint" id="composerHint">↵ 发送 · POST /api/chat { projectId, conversationId }</span>
          <button class="send" onclick="fakeSend()">发送 ↑</button>
        </div>
      </div>
    </div>
  </div>

  <div class="col col-editor">
    <div class="col-head">📝 App.jsx（项目级共享 · 切会话不变）</div>
    <div class="editor-wrap"><div class="editor"><div class="gutter" id="gutter"></div><pre class="code" id="code"></pre></div></div>
  </div>

  <div class="col col-preview">
    <div class="col-head">🖥 实时预览</div>
    <div class="statusbar"><span class="led"></span><span>渲染成功</span><span class="meta">· 项目当前代码 · 18ms</span></div>
    <div class="preview-stage" id="stage"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TODO_CODE =
`<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">export default function</span> <span class="fn">App</span>() {
  <span class="kw">const</span> [list, setList] = <span class="fn">useState</span>([]);
  <span class="kw">const</span> [text, setText] = <span class="fn">useState</span>(<span class="str">''</span>);
  <span class="kw">return</span> (
    &lt;<span class="tag">div</span>&gt;
      &lt;<span class="tag">h2</span>&gt;我的待办&lt;/<span class="tag">h2</span>&gt;
      {<span class="com">/* …省略 */</span>}
    &lt;/<span class="tag">div</span>&gt;
  );
}`;
const COUNTER_CODE =
`<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">export default function</span> <span class="fn">App</span>() {
  <span class="kw">const</span> [n, setN] = <span class="fn">useState</span>(0);
  <span class="kw">return</span> &lt;<span class="tag">div</span>&gt;{n}&lt;/<span class="tag">div</span>&gt;;
}`;
const LOGIN_CODE =
`<span class="kw">export default function</span> <span class="fn">App</span>() {
  <span class="kw">return</span> &lt;<span class="tag">form</span>&gt;&lt;<span class="tag">h2</span>&gt;登录&lt;/<span class="tag">h2</span>&gt;&lt;/<span class="tag">form</span>&gt;;
}`;

const healOk = `<div class="heal"><div class="heal-row done"><span class="num">✓</span>已生成 · 渲染成功</div>
  <div class="heal-step"><span class="tick">✓</span> 写代码 → 转译 → 执行 → RENDER_OK</div></div>`;
const healFix = `<div class="heal">
  <div class="heal-row fail"><span class="num">1</span>第 1 次：运行报错</div>
  <div class="heal-step"><span class="x">✕</span> TypeError: list.mp is not a function</div>
  <div class="heal-row done"><span class="num">✓</span>第 2 次：已修复 ✓ 渲染成功</div>
  <div class="heal-step"><span class="tick">✓</span> AI 读报错 → .mp → .map → RENDER_OK</div></div>`;

// project：共享 code/preview（项目级）+ 多条 conversations（各自只有聊天记录，无独立代码）
const PROJECTS = [
  { id:'p1', emoji:'✅', title:'待办列表 App', updated:'2 分钟前', code:TODO_CODE, preview:'todo-dark',
    conversations:[
      { id:'c1', title:'初始搭建 + 修 bug', time:'今天 14:20', transcript:[
        {role:'user', text:'做一个待办列表'},
        {role:'ai', summary:'<span class="ok">已生成 ✓ 渲染成功</span>', heal:healOk},
        {role:'user', text:'换成深色模式'},
        {role:'ai', summary:'<span class="err">运行报错</span>，AI 自动修复', heal:healFix, diff:'.mp() → .map()'},
      ]},
      { id:'c2', title:'另起线索：加筛选', time:'今天 15:30', transcript:[
        {role:'user', text:'底部加一个"清除已完成"按钮'},
        {role:'ai', summary:'<span class="ok">已修改 ✓ 渲染成功</span>', heal:healOk},
      ]},
    ]},
  { id:'p2', emoji:'🔢', title:'计数器', updated:'1 小时前', code:COUNTER_CODE, preview:'counter',
    conversations:[ { id:'c1', title:'基础计数器', time:'13:10', transcript:[
      {role:'user', text:'做一个计数器'}, {role:'ai', summary:'<span class="ok">已生成 ✓ 渲染成功</span>', heal:healOk} ]} ]},
  { id:'p3', emoji:'🔐', title:'登录表单', updated:'昨天', code:LOGIN_CODE, preview:'login',
    conversations:[ { id:'c1', title:'登录表单初版', time:'昨天 21:40', transcript:[
      {role:'user', text:'做一个登录表单'}, {role:'ai', summary:'<span class="ok">已生成 ✓ 渲染成功</span>', heal:healOk} ]} ]},
];

const PREVIEWS = {
  'todo-dark': `<div class="app-todo dark"><h2>我的待办 🌙</h2>
    <div class="add"><input placeholder="添加任务…" style="background:#23233d;color:#fff;border-color:#2e2e48"><button class="addb">添加</button></div>
    <ul style="padding:0;margin:0"><li class="done"><span class="dot"></span><span>买牛奶</span><button class="rm">×</button></li>
    <li><span class="dot"></span><span>写二期原型</span><button class="rm">×</button></li></ul>
    <button style="margin-top:8px;background:none;border:1px solid #2e2e48;color:#9aa0a6;border-radius:8px;padding:8px;width:100%">清除已完成</button></div>`,
  counter: `<div class="app-counter"><div class="n">7</div><div class="btns"><button>−</button><button>+</button></div></div>`,
  login: `<div class="app-login"><h2>登录</h2><label>邮箱</label><input placeholder="you@example.com">
    <label>密码</label><input type="password" placeholder="••••••••"><button class="sb">登录</button></div>`,
};

let curProject = null, curConv = null, nextId = 100;
const el = (id) => document.getElementById(id);

/* HOME */
function renderHome(){
  el('projectGrid').innerHTML = PROJECTS.map(p => `
    <div class="card" onclick="openProject('${p.id}')">
      <button class="del" onclick="event.stopPropagation();toast('🗑 软删 DELETE /api/projects/${p.id}（级联软删 files/conversations/messages）')" title="删除">🗑</button>
      <div class="emoji">${p.emoji}</div><h3>${p.title}</h3>
      <div class="meta"><span>💬 ${p.conversations.length} 条对话线索</span><span>· ${p.updated}</span></div>
    </div>`).join('') + `<div class="card new" onclick="newProject()"><div class="plus">＋</div>新建项目（新代码库）</div>`;
}
function goHome(){
  el('view-home').classList.remove('hidden'); el('view-workbench').classList.add('hidden');
  el('backBtn').classList.add('hidden');
  el('rerunBtn').style.visibility='hidden'; el('exportBtn').style.visibility='hidden';
  el('crumbName').textContent='我的项目'; curProject=null; curConv=null; renderHome();
}

/* WORKBENCH */
function openProject(pid){
  curProject = PROJECTS.find(p => p.id===pid);
  el('view-home').classList.add('hidden'); el('view-workbench').classList.remove('hidden');
  el('backBtn').classList.remove('hidden');
  el('rerunBtn').style.visibility='visible'; el('exportBtn').style.visibility='visible';
  el('crumbName').textContent = curProject.title;
  showCode();                                  // 代码/预览：项目级，进项目时渲染一次
  openConv(curProject.conversations[0].id);
}
function renderConvList(){
  el('convList').innerHTML = curProject.conversations.map(c => `
    <div class="conv-item ${c===curConv?'active':''}" onclick="openConv('${c.id}')">
      <span class="ci">💬</span>
      <span class="cm"><span class="ctitle">${c.title}</span><span class="ctime">${c.time}</span></span>
      <span class="badge">${c.transcript.filter(t=>t.role==='user').length} 轮</span>
    </div>`).join('');
}
// 切会话：只换聊天记录（GET messages），不动代码/预览
function openConv(cid){
  curConv = curProject.conversations.find(c => c.id===cid);
  renderConvList();
  renderChat(`<div class="restore-note"><span class="k">⟲</span> 切到会话「${curConv.title}」(GET messages) · 代码不变，仍是项目当前代码</div>`);
}
function newConv(){
  const c = { id:null, title:'新会话', time:'刚刚', transcript:[] };
  curProject.conversations.push(c); curConv = c; renderConvList();
  renderChat(`<div class="restore-note fresh"><span class="k">＋</span> 新对话线索：首次发送会懒建会话（POST /api/chat 不带 conversationId → init 回传）· 仍对着同一份代码</div>`);
}
function renderChat(headHtml){
  let html = headHtml;
  for(const m of curConv.transcript){
    html += m.role==='user'
      ? `<div class="msg user"><div class="av">🧑</div><div class="bubble">${m.text}</div></div>`
      : `<div class="msg ai"><div class="av">🤖</div><div class="bubble">${m.summary||''}${m.diff?`<div class="diff">↳ ${m.diff}</div>`:''}${m.heal||''}</div></div>`;
  }
  el('chatScroll').innerHTML = html; el('chatScroll').scrollTop = el('chatScroll').scrollHeight;
}
function showCode(){
  el('code').innerHTML = curProject.code;
  el('gutter').innerHTML = Array.from({length: curProject.code.split('\n').length}, (_,i)=>`<span>${i+1}</span>`).join('');
  el('stage').innerHTML = PREVIEWS[curProject.preview] || '';
}
function newProject(){
  const p = { id:'p'+(nextId++), emoji:'✨', title:'新项目', updated:'刚刚', code:COUNTER_CODE, preview:'counter',
    conversations:[{ id:null, title:'新会话', time:'刚刚', transcript:[] }] };
  PROJECTS.unshift(p);
  toast('＋ POST /api/projects 建空项目（新代码库）');
  openProject(p.id);
}
function fakeSend(){
  const v = el('composer').value.trim(); if(!v){ toast('输入点什么吧～'); return; }
  el('composer').value='';
  if(curConv.id === null){            // 懒建会话：首条 + 没 conversationId → init 回传
    curConv.id = 'c'+(nextId++); curConv.title = v.length>12?v.slice(0,12)+'…':v;
    renderConvList(); toast('init：后端懒建会话，SSE 回传 conversationId='+curConv.id);
  } else {
    toast('POST /api/chat { projectId:'+curProject.id+', conversationId:'+curConv.id+' }');
  }
  curConv.transcript.push({role:'user', text:v});
  renderChat(el('chatScroll').querySelector('.restore-note')?.outerHTML || '');
  el('chatScroll').insertAdjacentHTML('beforeend',
    `<div class="msg ai"><div class="av">🤖</div><div class="bubble"><span class="spin"></span> AI 正在写代码…</div></div>`);
  el('chatScroll').scrollTop = el('chatScroll').scrollHeight;
  setTimeout(()=>{
    curConv.transcript.push({role:'ai', summary:'<span class="ok">已修改 ✓ 渲染成功</span>', heal:healOk});
    renderChat(el('chatScroll').querySelector('.restore-note')?.outerHTML || '');
    toast('✓ 落库 messages（conversation_id，waitUntil）· 代码经 PUT /files 更新（项目级）');
  }, 1100);
}

let toastT;
function toast(msg){ const t=el('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'), 2400); }

el('rerunBtn').style.visibility='hidden'; el('exportBtn').style.visibility='hidden';
renderHome();
</script>
</body>
</html>
